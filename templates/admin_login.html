{% extends 'base.html' %}
{% block title %}Admin Login – Kavi's Dairy{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card admin-card">
        <div class="auth-icon">🛡️</div>
        <h2 class="auth-title">Admin Portal</h2>
        <p class="auth-sub">Restricted area — Authorized personnel only</p>

        <form method="POST" action="{{ url_for('admin_login') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required>
            </div>
            <button type="submit" class="btn btn-danger btn-block">🔐 Admin Login</button>
        </form>

        <div class="auth-footer">
            <p>Default: <code>admin</code> / <code>admin123</code></p>
            <p><a href="{{ url_for('login') }}">← Back to User Login</a></p>
        </div>
    </div>
</section>
{% endblock %}
